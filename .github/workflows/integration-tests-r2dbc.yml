name: Integration Tests for R2DBC

on:
  pull_request:
  push:
    branches:
      - main
    tags-ignore: [ v.* ]

permissions:
  contents: read

jobs:
  postgres-test:
    name: Build and Test Integration for R2DBC with PostgreSQL
    runs-on: ubuntu-22.04
    if: github.repository == 'apache/pekko-projection'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { java-version: 17, scala-version: 2.13,  sbt-opts: '' }
          - { java-version: 17, scala-version: next,   sbt-opts: '' }

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout GitHub merge
        if: github.event.pull_request
        run: |-
          git fetch origin pull/${{ github.event.pull_request.number }}/merge:scratch
          git checkout scratch

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Install sbt
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Start PostgreSQL DB
        run: |-
          docker compose -f docker-files/docker-compose-postgres.yml up -d --wait
          # loop to wait for the DB to be ready
          for i in {1..8}; do
            if docker exec -i docker-postgres-db-1 psql -U postgres \
                -t -c 'SELECT 1;' 2>/dev/null; then
              break
            fi
            echo "Retry $i: SQL check failed, waiting before retry..."
            sleep $((i * 2))
          done
          docker exec -i docker-postgres-db-1 psql -U postgres -t < r2dbc-int-test/ddl-scripts/create_tables_postgres.sql
          docker exec -i docker-postgres-db-1 psql -U postgres -t -c 'CREATE DATABASE database1;'
          docker exec -i docker-postgres-db-1 psql -U postgres -t -d database1 < r2dbc-int-test/ddl-scripts/create_tables_postgres.sql
          docker exec -i docker-postgres-db-1 psql -U postgres -t -c 'CREATE DATABASE database2;'
          docker exec -i docker-postgres-db-1 psql -U postgres -t -d database2 < r2dbc-int-test/ddl-scripts/create_tables_postgres.sql

      - name: Run all integration tests with default Scala and Java ${{ matrix.java-version }}
        run: |-
          scala_version="$(bash .github/scripts/resolve-scala-version.sh "${{ matrix.scala-version }}")"
          sbt "++${scala_version}!" "r2dbc-int-test/test" ${{ matrix.sbt-opts }}

      - name: Print logs on failure
        if: ${{ failure() }}
        run: find . -name "*.log" -exec ./scripts/cat-log.sh {} \;

  yugabyte-test:
    name: Build and Test Integration for R2DBC with YugabyteDB
    runs-on: ubuntu-22.04
    if: github.repository == 'apache/pekko-projection'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { java-version: 17, scala-version: 2.13,  sbt-opts: '' }
          - { java-version: 17, scala-version: next,   sbt-opts: '' }

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout GitHub merge
        if: github.event.pull_request
        run: |-
          git fetch origin pull/${{ github.event.pull_request.number }}/merge:scratch
          git checkout scratch

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Install sbt
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Start YugabyteDB
        run: |-
          docker compose -f docker-files/docker-compose-yugabyte.yml up -d --wait
          # loop to wait for the DB to be ready
          for i in {1..8}; do
            if docker exec -i yb-tserver-n1 /home/yugabyte/bin/ysqlsh \
                -h yb-tserver-n1 -t -c 'SELECT 1;' 2>/dev/null; then
              break
            fi
            echo "Retry $i: SQL check failed, waiting before retry..."
            sleep $((i * 2))
          done
          docker exec -i yb-tserver-n1 /home/yugabyte/bin/ysqlsh -h yb-tserver-n1 -t < r2dbc-int-test/ddl-scripts/create_tables_yugabyte.sql
          docker exec -i yb-tserver-n1 /home/yugabyte/bin/ysqlsh -h yb-tserver-n1 -t -c 'CREATE DATABASE database1;'
          docker exec -i yb-tserver-n1 /home/yugabyte/bin/ysqlsh -h yb-tserver-n1 -t -d database1 < r2dbc-int-test/ddl-scripts/create_tables_yugabyte.sql
          docker exec -i yb-tserver-n1 /home/yugabyte/bin/ysqlsh -h yb-tserver-n1 -t -c 'CREATE DATABASE database2;'
          docker exec -i yb-tserver-n1 /home/yugabyte/bin/ysqlsh -h yb-tserver-n1 -t -d database2 < r2dbc-int-test/ddl-scripts/create_tables_yugabyte.sql

      - name: test
        run: |-
          scala_version="$(bash .github/scripts/resolve-scala-version.sh "${{ matrix.scala-version }}")"
          sbt -Dpekko.persistence.r2dbc.dialect=yugabyte -Dpekko.projection.r2dbc.dialect=yugabyte "++${scala_version}!" "r2dbc-int-test/test" ${{ matrix.sbt-opts }}

      - name: Print logs on failure
        if: ${{ failure() }}
        run: find . -name "*.log" -exec ./scripts/cat-log.sh {} \;

  mysql-test:
    name: Build and Test Integration for R2DBC with MySQL
    runs-on: ubuntu-22.04
    if: github.repository == 'apache/pekko-projection'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { java-version: 17, scala-version: 2.13,  sbt-opts: '' }
          - { java-version: 17, scala-version: next,   sbt-opts: '' }

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout GitHub merge
        if: github.event.pull_request
        run: |-
          git fetch origin pull/${{ github.event.pull_request.number }}/merge:scratch
          git checkout scratch

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Install sbt
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Start MySQL
        run: |-
          docker compose -f docker-files/docker-compose-mysql.yml up -d --wait
          # loop to wait for the DB to be ready
          for i in {1..8}; do
            if docker exec -i docker-mysql-db-1 mysql \
                -h 127.0.0.1 --user=root --password=root --database=mysql -e 'SELECT 1;' 2>/dev/null; then
              break
            fi
            echo "Retry $i: SQL check failed, waiting before retry..."
            sleep $((i * 2))
          done
          docker exec -i docker-mysql-db-1 mysql -h 127.0.0.1 --user=root --password=root --database=mysql < r2dbc-int-test/ddl-scripts/create_tables_mysql.sql
          docker exec -i docker-mysql-db-1 mysql -h 127.0.0.1 --user=root --password=root -e 'CREATE SCHEMA database1;'
          docker exec -i docker-mysql-db-1 mysql -h 127.0.0.1 --user=root --password=root --database=database1 < r2dbc-int-test/ddl-scripts/create_tables_mysql.sql
          docker exec -i docker-mysql-db-1 mysql -h 127.0.0.1 --user=root --password=root -e 'CREATE SCHEMA database2;'
          docker exec -i docker-mysql-db-1 mysql -h 127.0.0.1 --user=root --password=root --database=database2 < r2dbc-int-test/ddl-scripts/create_tables_mysql.sql

      - name: test
        run: |-
          scala_version="$(bash .github/scripts/resolve-scala-version.sh "${{ matrix.scala-version }}")"
          sbt -Dpekko.persistence.r2dbc.dialect=mysql -Dpekko.projection.r2dbc.dialect=mysql "++${scala_version}!" "r2dbc-int-test/test" ${{ matrix.sbt-opts }}

      - name: Print logs on failure
        if: ${{ failure() }}
        run: find . -name "*.log" -exec ./scripts/cat-log.sh {} \;
