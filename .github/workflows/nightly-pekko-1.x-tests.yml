name: Nightly Integration Tests for JDBC (Pekko 1.x)

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Build and Test Integration for JDBC
    runs-on: ubuntu-22.04
    if: github.repository == 'apache/pekko-projection'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { java-version: 8, scala-version: 2.13, sbt-opts: '' }
          - { java-version: 8, scala-version: 3.3, sbt-opts: '' }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: 1.2.x

      - name: Copy license acceptance
        run: |-
          cp container-license-acceptance.txt jdbc-int-test/src/test/resources/container-license-acceptance.txt

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Install sbt
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Cache Coursier cache
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - name: Run all integration tests with Scala ${{ matrix.scala-version }} and Java ${{ matrix.java-version }}
        run: |
          sbt -Dpekko.build.pekko.version=1.x \
            -Dpekko.build.pekko.connectors.version=1.x \
            ++${{ matrix.scala-version }} \
            jdbc-int-test/test ${{ matrix.sbt-opts }}
        env: # Disable Ryuk resource reaper since we always spin up fresh VMs
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Print logs on failure
        if: ${{ failure() }}
        run: find . -name "*.log" -exec ./scripts/cat-log.sh {} \;
