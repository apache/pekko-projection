# SPDX-License-Identifier: Apache-2.0

pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "DEBUG"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  logger-startup-timeout = 15 seconds

  actor {
    debug {
      lifecycle = off
      receive = off
    }
    serializers {
      jackson-json = "org.apache.pekko.serialization.jackson.JacksonJsonSerializer"
    }
    serialization-bindings {
      "org.apache.pekko.projection.grpc.internal.WrappedEvent" = jackson-json
    }
  }

  persistence {
    journal.plugin = "pekko.persistence.journal.inmem"
    snapshot-store.plugin = "pekko.persistence.snapshot-store.local"
  }

  projection.grpc.producer {
    query-plugin-id = "pekko.persistence.query.journal.inmem"
  }
}
