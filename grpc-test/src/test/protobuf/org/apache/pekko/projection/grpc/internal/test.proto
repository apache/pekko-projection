syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.apache.pekko.projection.grpc.internal.proto";

package org.apache.pekko.projection.grpc.internal;


message TestEvent {
    string cart_id = 1;
    string item_id = 2;
    int32 quantity = 3;
}
